<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Piggy — Your Budget Buddy</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --pink: #f9c8da;
    --pink-dark: #e87fa8;
    --pink-text: #a0385c;
    --lavender: #e8d9f5;
    --lavender-dark: #c4a0e8;
    --mint: #c9f0e4;
    --mint-dark: #5dbfa0;
    --peach: #fde3c8;
    --peach-dark: #f0a860;
    --cream: #fdf8f2;
    --card: #ffffff;
    --text: #3d2c35;
    --muted: #9e8490;
    --border: #f0e4ec;
    --danger: #f28b82;
    --success: #5dbfa0;
    --radius: 20px;
    --radius-sm: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }
  h1, h2, h3, .logo { font-family: 'Fraunces', serif; }

  /* Layout */
  .header {
    background: white;
    border-bottom: 1.5px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 22px; color: var(--pink-dark); display: flex; align-items: center; gap: 8px; }
  .logo span { font-size: 24px; }
  .month-nav { display: flex; align-items: center; gap: 12px; }
  .month-nav button {
    background: var(--pink);
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 16px;
    cursor: pointer;
    color: var(--pink-text);
    transition: background 0.15s;
  }
  .month-nav button:hover { background: var(--pink-dark); color: white; }
  #month-label { font-family: 'Fraunces', serif; font-size: 16px; min-width: 130px; text-align: center; }

  .main { max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }
  .summary-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    border: 1.5px solid var(--border);
  }
  .summary-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .summary-card .amount { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; }
  .summary-card.income .amount { color: var(--mint-dark); }
  .summary-card.expense .amount { color: var(--pink-dark); }
  .summary-card.balance .amount { color: var(--text); }

  /* Two columns */
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 640px) {
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .summary-card:last-child { grid-column: span 2; }
    .cols { grid-template-columns: 1fr; }
  }

  /* Card */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    padding: 20px;
    margin-bottom: 20px;
  }
  .card-title {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Add transaction form */
  .form-row { display: flex; flex-direction: column; gap: 10px; }
  .form-row input, .form-row select {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    outline: none;
    transition: border 0.15s;
  }
  .form-row input:focus, .form-row select:focus { border-color: var(--pink-dark); }
  .form-row .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .type-btn {
    padding: 9px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
  }
  .type-btn.active.income { background: var(--mint); border-color: var(--mint-dark); color: #2a6e58; font-weight: 500; }
  .type-btn.active.expense { background: var(--pink); border-color: var(--pink-dark); color: var(--pink-text); font-weight: 500; }
  .add-btn {
    background: var(--pink-dark);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
    margin-top: 4px;
  }
  .add-btn:hover { opacity: 0.88; }

  /* Transactions list */
  .tx-list { display: flex; flex-direction: column; gap: 8px; max-height: 340px; overflow-y: auto; }
  .tx-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--cream);
    border-radius: var(--radius-sm);
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: none; } }
  .tx-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .tx-icon.income { background: var(--mint); }
  .tx-icon.expense { background: var(--pink); }
  .tx-info { flex: 1; min-width: 0; }
  .tx-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-cat { font-size: 12px; color: var(--muted); }
  .tx-amount { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 600; flex-shrink: 0; }
  .tx-amount.income { color: var(--mint-dark); }
  .tx-amount.expense { color: var(--pink-dark); }
  .tx-delete {
    background: none; border: none; cursor: pointer;
    color: var(--border); font-size: 16px;
    padding: 4px; border-radius: 50%;
    transition: color 0.15s;
  }
  .tx-delete:hover { color: var(--danger); }
  .empty-state { text-align: center; color: var(--muted); font-size: 14px; padding: 32px 0; }

  /* Savings goals */
  .goal-list { display: flex; flex-direction: column; gap: 12px; }
  .goal-item { background: var(--cream); border-radius: var(--radius-sm); padding: 12px 14px; }
  .goal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .goal-name { font-weight: 500; font-size: 14px; display: flex; align-items: center; gap: 6px; }
  .goal-amount { font-size: 13px; color: var(--muted); }
  .progress-bar { height: 8px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--lavender-dark), var(--pink-dark)); transition: width 0.4s ease; }
  .goal-pct { font-size: 11px; color: var(--muted); text-align: right; margin-top: 4px; }

  .add-goal-form { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .add-goal-form input {
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    background: white;
    color: var(--text);
    outline: none;
    flex: 1; min-width: 80px;
  }
  .add-goal-form input:focus { border-color: var(--lavender-dark); }
  .add-goal-form button {
    background: var(--lavender);
    border: 1.5px solid var(--lavender-dark);
    color: #6a3f9e;
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
  }
  .add-goal-form button:hover { background: var(--lavender-dark); color: white; }

  /* Chart */
  .bar-chart { display: flex; flex-direction: column; gap: 8px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { font-size: 12px; color: var(--muted); width: 80px; flex-shrink: 0; text-align: right; }
  .bar-outer { flex: 1; background: var(--border); border-radius: 99px; height: 14px; overflow: hidden; }
  .bar-inner { height: 100%; border-radius: 99px; transition: width 0.4s ease; min-width: 4px; }
  .bar-val { font-size: 12px; color: var(--muted); width: 60px; text-align: right; flex-shrink: 0; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--text);
    color: white;
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="header">
  <div class="logo"><span>🐷</span> Piggy</div>
  <div class="month-nav">
    <button id="prev-month">‹</button>
    <div id="month-label"></div>
    <button id="next-month">›</button>
  </div>
</header>

<main class="main">
  <!-- Summary -->
  <div class="summary-grid">
    <div class="summary-card income">
      <div class="label">💚 Income</div>
      <div class="amount" id="total-income">Rp 0</div>
    </div>
    <div class="summary-card expense">
      <div class="label">🌸 Expenses</div>
      <div class="amount" id="total-expense">Rp 0</div>
    </div>
    <div class="summary-card balance">
      <div class="label">✨ Balance</div>
      <div class="amount" id="total-balance">Rp 0</div>
    </div>
  </div>

  <div class="cols">
    <!-- Left column -->
    <div>
      <!-- Add transaction -->
      <div class="card">
        <div class="card-title">🌷 Add Transaction</div>
        <div class="form-row">
          <div class="type-toggle">
            <button class="type-btn income active" id="btn-income" onclick="setType('income')">+ Income</button>
            <button class="type-btn expense" id="btn-expense" onclick="setType('expense')">- Expense</button>
          </div>
          <input id="tx-desc" type="text" placeholder="Description (e.g. Salary, Lunch)" />
          <div class="row2">
            <input id="tx-amount" type="number" placeholder="Amount (Rp)" min="0" />
            <select id="tx-cat">
              <option value="Food">🍜 Food</option>
              <option value="Transport">🚌 Transport</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Health">💊 Health</option>
              <option value="Entertainment">🎬 Fun</option>
              <option value="Salary">💼 Salary</option>
              <option value="Other">📦 Other</option>
            </select>
          </div>
          <input id="tx-date" type="date" />
          <button class="add-btn" onclick="addTransaction()">Add ✓</button>
        </div>
      </div>

      <!-- Savings goals -->
      <div class="card">
        <div class="card-title">🌟 Savings Goals</div>
        <div class="goal-list" id="goal-list"></div>
        <div class="add-goal-form">
          <input id="goal-name" type="text" placeholder="Goal name" />
          <input id="goal-target" type="number" placeholder="Target (Rp)" min="1" />
          <input id="goal-saved" type="number" placeholder="Saved (Rp)" min="0" />
          <button onclick="addGoal()">+ Goal</button>
        </div>
      </div>
    </div>

    <!-- Right column -->
    <div>
      <!-- Transactions list -->
      <div class="card">
        <div class="card-title">📋 Transactions</div>
        <div class="tx-list" id="tx-list"></div>
      </div>

      <!-- Spending breakdown -->
      <div class="card">
        <div class="card-title">📊 Spending by Category</div>
        <div class="bar-chart" id="bar-chart"></div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const CATEGORY_COLORS = {
  Food: '#f9c8da',
  Transport: '#c9f0e4',
  Shopping: '#e8d9f5',
  Health: '#fde3c8',
  Entertainment: '#b8e4f9',
  Salary: '#c9f0e4',
  Other: '#e8e8e8',
};
const CATEGORY_ICONS = {
  Food:'🍜', Transport:'🚌', Shopping:'🛍️', Health:'💊',
  Entertainment:'🎬', Salary:'💼', Other:'📦'
};
const TYPE_ICONS = { income:'💚', expense:'🌸' };

let currentType = 'income';
let currentDate = new Date();
let data = JSON.parse(localStorage.getItem('piggy-data') || '{"transactions":[],"goals":[]}');

function save() { localStorage.setItem('piggy-data', JSON.stringify(data)); }

function fmt(n) {
  return 'Rp ' + Math.abs(n).toLocaleString('id-ID');
}

function getMonthKey() {
  return `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}`;
}

function getMonthTransactions() {
  const key = getMonthKey();
  return data.transactions.filter(t => t.date.startsWith(key));
}

function setType(t) {
  currentType = t;
  document.getElementById('btn-income').className = 'type-btn income' + (t==='income'?' active':'');
  document.getElementById('btn-expense').className = 'type-btn expense' + (t==='expense'?' active':'');
  const catSel = document.getElementById('tx-cat');
  if (t === 'income') {
    catSel.value = 'Salary';
  } else {
    catSel.value = 'Food';
  }
}

function addTransaction() {
  const desc = document.getElementById('tx-desc').value.trim();
  const amount = parseFloat(document.getElementById('tx-amount').value);
  const cat = document.getElementById('tx-cat').value;
  const date = document.getElementById('tx-date').value || new Date().toISOString().slice(0,10);
  if (!desc || !amount || amount <= 0) { showToast('Please fill in all fields 💕'); return; }
  data.transactions.push({ id: Date.now(), type: currentType, desc, amount, cat, date });
  save();
  document.getElementById('tx-desc').value = '';
  document.getElementById('tx-amount').value = '';
  render();
  showToast('Added! 🌸');
}

function deleteTransaction(id) {
  data.transactions = data.transactions.filter(t => t.id !== id);
  save();
  render();
}

function addGoal() {
  const name = document.getElementById('goal-name').value.trim();
  const target = parseFloat(document.getElementById('goal-target').value);
  const saved = parseFloat(document.getElementById('goal-saved').value) || 0;
  if (!name || !target || target <= 0) { showToast('Fill in goal name & target 💕'); return; }
  data.goals.push({ id: Date.now(), name, target, saved });
  save();
  document.getElementById('goal-name').value = '';
  document.getElementById('goal-target').value = '';
  document.getElementById('goal-saved').value = '';
  renderGoals();
  showToast('Goal added! ✨');
}

function deleteGoal(id) {
  data.goals = data.goals.filter(g => g.id !== id);
  save();
  renderGoals();
}

function updateMonthLabel() {
  const months = ['January','February','March','April','May','June',
    'July','August','September','October','November','December'];
  document.getElementById('month-label').textContent =
    months[currentDate.getMonth()] + ' ' + currentDate.getFullYear();
}

function render() {
  updateMonthLabel();
  const txs = getMonthTransactions();
  const income = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income - expense;

  document.getElementById('total-income').textContent = fmt(income);
  document.getElementById('total-expense').textContent = fmt(expense);
  const balEl = document.getElementById('total-balance');
  balEl.textContent = (balance < 0 ? '- ' : '') + fmt(balance);
  balEl.style.color = balance < 0 ? '#e87fa8' : '#3d2c35';

  // Transactions list
  const list = document.getElementById('tx-list');
  if (txs.length === 0) {
    list.innerHTML = '<div class="empty-state">No transactions yet 🌸<br>Add your first one!</div>';
  } else {
    const sorted = [...txs].sort((a,b)=>b.date.localeCompare(a.date));
    list.innerHTML = sorted.map(t => `
      <div class="tx-item">
        <div class="tx-icon ${t.type}">${CATEGORY_ICONS[t.cat]||'📦'}</div>
        <div class="tx-info">
          <div class="tx-desc">${t.desc}</div>
          <div class="tx-cat">${t.cat} · ${t.date}</div>
        </div>
        <div class="tx-amount ${t.type}">${t.type==='income'?'+':'-'} ${fmt(t.amount)}</div>
        <button class="tx-delete" onclick="deleteTransaction(${t.id})">✕</button>
      </div>
    `).join('');
  }

  // Bar chart
  const cats = {};
  txs.filter(t=>t.type==='expense').forEach(t=>{ cats[t.cat]=(cats[t.cat]||0)+t.amount; });
  const maxVal = Math.max(...Object.values(cats), 1);
  const barChart = document.getElementById('bar-chart');
  if (Object.keys(cats).length === 0) {
    barChart.innerHTML = '<div class="empty-state" style="padding:20px 0">No expenses yet 🌷</div>';
  } else {
    barChart.innerHTML = Object.entries(cats)
      .sort((a,b)=>b[1]-a[1])
      .map(([cat, val]) => `
        <div class="bar-row">
          <div class="bar-label">${CATEGORY_ICONS[cat]} ${cat}</div>
          <div class="bar-outer">
            <div class="bar-inner" style="width:${Math.round(val/maxVal*100)}%; background:${CATEGORY_COLORS[cat]||'#eee'}; border: 1.5px solid rgba(0,0,0,0.08);"></div>
          </div>
          <div class="bar-val">${fmt(val)}</div>
        </div>
      `).join('');
  }

  renderGoals();
}

function renderGoals() {
  const list = document.getElementById('goal-list');
  if (data.goals.length === 0) {
    list.innerHTML = '<div class="empty-state" style="padding:16px 0">No goals yet ✨</div>';
    return;
  }
  list.innerHTML = data.goals.map(g => {
    const pct = Math.min(100, Math.round(g.saved / g.target * 100));
    return `
      <div class="goal-item">
        <div class="goal-header">
          <div class="goal-name">🌟 ${g.name}</div>
          <div style="display:flex;gap:8px;align-items:center">
            <div class="goal-amount">${fmt(g.saved)} / ${fmt(g.target)}</div>
            <button class="tx-delete" onclick="deleteGoal(${g.id})">✕</button>
          </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="goal-pct">${pct}% there 💕</div>
      </div>
    `;
  }).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// Month navigation
document.getElementById('prev-month').onclick = () => {
  currentDate.setMonth(currentDate.getMonth()-1);
  render();
};
document.getElementById('next-month').onclick = () => {
  currentDate.setMonth(currentDate.getMonth()+1);
  render();
};

// Set default date
document.getElementById('tx-date').value = new Date().toISOString().slice(0,10);

render();
</script>
</body>
</html>
